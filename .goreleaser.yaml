version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: timon
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X {{ .ModulePath }}/internal/buildinfo.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch